          <input
            type={show?"text":"password"}
            value={pwd}
            onChange={e=>{setPwd(e.target.value); setError(false);}}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}
            placeholder="Пароль"
            autoFocus
            style={{
              width:"100%", padding:"13px 44px 13px 16px",
              fontSize:16, borderRadius:12,
              background:C.surface,
              border:`1px solid ${error?C.accent:pwd?C.green:C.border}`,
              color:C.text, outline:"none",
              transition:"border-color .2s, box-shadow .2s",
              boxShadow: pwd&&!error?`0 0 0 3px ${C.green}22`:"none"
            }}
          />
          <button onClick={()=>setShow(s=>!s)} style={{
            position:"absolute", right:12, top:"50%",
            transform:"translateY(-50%)",
            background:"none", color:C.muted, fontSize:16,
            padding:4, border:"none"
          }}>{show?"🙈":"👁"}</button>
        </div>

        {error&&<div style={{
          background:C.accentSoft, border:`1px solid ${C.accent}44`,
          borderRadius:8, padding:"8px 12px", fontSize:13,
          color:C.accent, textAlign:"center", marginBottom:12
        }}>Неверный пароль</div>}

        <button onClick={tryLogin} style={{
          width:"100%", padding:"13px",
          background:`linear-gradient(135deg,${C.green},${C.teal})`,
          color:"#08090f", border:"none", borderRadius:12,
          fontSize:15, fontWeight:700, cursor:"pointer",
          boxShadow:`0 4px 20px ${C.green}44`,
          transition:"opacity .15s"
        }}>Войти</button>
      </div>

      <div style={{
        textAlign:"center", marginTop:20,
        fontSize:11, color:C.muted, letterSpacing:".5px"
      }}>🔒 Защищённый доступ</div>
    </div>
  </div>;
}

function App(){
  const [authed, setAuthed] = useState(()=>{
    try{ return localStorage.getItem("ttk_auth")==="1"; }catch{ return false; }
  });
  const [state, setState]      = useState({products:[],semis:[],dishes:[]});
  const [appReady, setReady]   = useState(false);
  const [tab, setTab]          = useState("products");
  const [sync, setSync]        = useState("loading");
  const [syncTime, setSyncTime]= useState(null);
  const [sbError, setSbError]  = useState(""); // ошибка Supabase
  const [showSetup, setShowSetup] = useState(false); // модал настройки таблицы

  const saveTimer    = useRef(null);
  const isFirstState = useRef(true);
  const skipSave     = useRef(false);
  const lastSbTs     = useRef(0);

  // ── Офлайн режим ──
  const [isOnline, setIsOnline] = useState(()=>{
    try{ return navigator.onLine; }catch{ return true; }
  });
  const pendingSync = useRef(false); // есть несохранённые изменения

  // Отслеживаем появление/пропадание интернета
  useEffect(()=>{
    function goOnline(){
      setIsOnline(true);
      // При восстановлении сети — синхронизируем несохранённые изменения
      if(pendingSync.current){
        const ts = Date.now();
        sbSave({ts, products:state.products, semis:state.semis, dishes:state.dishes})
          .then(()=>{
            lastSbTs.current = ts;
            LS.set("ttk_ts", ts);
            pendingSync.current = false;
            setSync("saved");
            setSbError("");
            setTimeout(()=>setSync(s=>s==="saved"?"idle":s), 2500);
          })
          .catch(()=>setSync("error"));
      }
    }
    function goOffline(){ setIsOnline(false); setSync("offline"); }
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return ()=>{
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  },[state]);

  // ── Загрузка при старте ──
  useEffect(()=>{
    (async()=>{
      setSync("loading");

      // Сначала пробуем загрузить из Supabase — он всегда в приоритете
      try{
        const sbData = await sbLoad();
        if(sbData && (sbData.products||sbData.semis||sbData.dishes)){
          // Supabase содержит данные — используем их ВСЕГДА
          // SEED_PRODUCTS никогда не перезаписывает данные из Supabase
          lastSbTs.current = sbData.ts||0;
          skipSave.current = true;
          isFirstState.current = true;
          const loaded = {
            products: sbData.products || [],
            semis:    sbData.semis    || [],
            dishes:   sbData.dishes   || []
          };
          setState(loaded);
          // Синхронизируем localStorage с Supabase
          LS.set("products", loaded.products);
          LS.set("semis",    loaded.semis);
          LS.set("dishes",   loaded.dishes);
          LS.set("ttk_ts",   sbData.ts||0);
          setSync("synced");
          setTimeout(()=>setSync("idle"),3000);
        } else {
          // Supabase пустой — только тогда используем localStorage или SEED
          const localData = {
            products: LS.get("products", SEED_PRODUCTS),
            semis:    LS.get("semis",    SEED_SEMIS),
            dishes:   LS.get("dishes",   SEED_DISHES)
          };
          setState(localData);
          setSync("idle");
        }
      }catch(e){
        if(e.message==="TABLE_NOT_FOUND"){
          setSbError("table");
          setShowSetup(true);
        } else {
          setSbError(e.message||"Ошибка подключения");
        }
        // При ошибке Supabase — грузим из localStorage
        const localData = {
          products: LS.get("products", SEED_PRODUCTS),
          semis:    LS.get("semis",    SEED_SEMIS),
          dishes:   LS.get("dishes",   SEED_DISHES)
        };
        setState(localData);
        setSync("error");
      }
      setReady(true);
    })();
  },[]);

  // ── Автосохранение ──
  useEffect(()=>{
    if(!appReady) return;
    if(isFirstState.current){ isFirstState.current=false; return; }
    if(skipSave.current){ skipSave.current=false; return; }

    // Всегда сохраняем локально (работает офлайн)
    LS.set("products",state.products);
    LS.set("semis",   state.semis);
    LS.set("dishes",  state.dishes);

    // Если нет интернета — помечаем что есть несохранённые изменения
    if(!isOnline){
      pendingSync.current = true;
      setSync("offline");
      return;
    }

    setSync("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async()=>{
      const ts = Date.now();
      try{
        await sbSave({ts, products:state.products, semis:state.semis, dishes:state.dishes});
        lastSbTs.current = ts;
        LS.set("ttk_ts", ts);
        pendingSync.current = false;
        setSyncTime(ts);
        setSync("saved");
        setSbError("");
        setTimeout(()=>setSync(s=>s==="saved"?"idle":s), 2500);
      }catch(e){
        if(e.message==="TABLE_NOT_FOUND"){
          setSbError("table");
          setShowSetup(true);
          setSync("error");
        } else if(!navigator.onLine){
          // Потеряли сеть во время сохранения
          pendingSync.current = true;
          setIsOnline(false);
          setSync("offline");
        } else {
          setSbError(e.message||"Ошибка сохранения");
          pendingSync.current = true;
          setSync("error");
        }
      }
    }, 800);
  },[state, appReady, isOnline]);

  // ── Автополинг каждые 8 сек ──
  useEffect(()=>{
    if(!appReady) return;
    const poll = setInterval(async()=>{
      if(!navigator.onLine) return; // офлайн — не опрашиваем
      // Не перезаписываем локальные несохранённые изменения
      if(pendingSync.current) return;
      try{
        const sbData = await sbLoad();
        if(sbData && sbData.ts && sbData.ts > lastSbTs.current + 500){
          lastSbTs.current = sbData.ts;
          skipSave.current = true;
          isFirstState.current = true;
          setState({
            products: sbData.products||[],
            semis:    sbData.semis||[],
            dishes:   sbData.dishes||[]
          });
          setSyncTime(sbData.ts);
          setSync("synced");
          setTimeout(()=>setSync("idle"),3000);
        }
      }catch{}
    }, 8000);
    return ()=>clearInterval(poll);
  },[appReady]);

  // ── Dispatch ──
  const dispatch = useCallback(a=> setState(s=> reducer(s,a)),[]);

  // ── Ручная синхронизация ──
  async function manualSync(){
    setSync("saving");
    try{
      const ts = Date.now();
      await sbSave({ts, products:state.products, semis:state.semis, dishes:state.dishes});
      lastSbTs.current = ts;
      LS.set("ttk_ts", ts);
      setSyncTime(ts); setSync("saved"); setSbError("");
      setTimeout(()=>setSync(s=>s==="saved"?"idle":s), 2500);
    }catch(e){ setSbError(e.message||"Ошибка"); setSync("error"); }
  }

  // ── ПЕРЕНОС ДАННЫХ ЧЕРЕЗ ТЕКСТ ──
  const [showSyncModal, setShowSyncModal] = useState(false);
  const [syncTab,    setSyncTab]    = useState("export");
  const [syncText,   setSyncText]   = useState("");
  const [syncOp,     setSyncOp]     = useState("");
  const [syncMsg,    setSyncMsg]    = useState("");
  const pasteRef = useRef(null);

  function encodeData(){
    // Экспортируем только последнюю цену каждого продукта (без всей истории)
    const products = state.products.map(({id,name,unit,priceFor,category,priceHistory})=>({
      id,name,unit,priceFor,category,
      priceHistory: priceHistory?.length ? [priceHistory[priceHistory.length-1]] : []
    }));
    const semis = state.semis.map(({id,name,outputUnit,outputQtyOverride,composition,semiLines})=>({
      id,name,outputUnit,
      ...(outputQtyOverride?{outputQtyOverride}:{}),
      composition:composition||[],
      semiLines:semiLines||[]
    }));
    const dishes = state.dishes.map(({id,name,category,price,weightOverride,productLines,semiLines,dishLines,packLines})=>({
      id,name,category,price,
      ...(weightOverride?{weightOverride}:{}),
      productLines:productLines||[],
      semiLines:semiLines||[],
      dishLines:dishLines||[],
      packLines:packLines||[]
    }));
    const data={v:1,ts:Date.now(),products,semis,dishes};
    try{ return "TTK1:" + btoa(unescape(encodeURIComponent(JSON.stringify(data)))); }
    catch{ return "TTK1:" + btoa(JSON.stringify(data)); }
  }
  function openExport(){ setSyncTab("export"); setSyncOp(""); setSyncMsg(""); setSyncText(encodeData()); setShowSyncModal(true); }
  function openImport(){ setSyncTab("import"); setSyncOp(""); setSyncMsg(""); setSyncText(""); setShowSyncModal(true); }

  async function shareData(){
    const text = syncText || encodeData();
    // На мобильном — открываем системный диалог (Заметки, Telegram и т.д.)
    if(navigator.share){
      try{
        await navigator.share({ title:"ТТК данные", text });
        setSyncOp("copied"); setSyncMsg("Готово! Вставьте текст в Заметки и данные появятся на всех устройствах iCloud.");
      }catch(e){ if(e.name!=="AbortError") copyToClipboard(); }
    } else {
      copyToClipboard();
    }
  }

  async function copyToClipboard(){
    try{
      await navigator.clipboard.writeText(syncText);
      setSyncOp("copied"); setSyncMsg("Скопировано! Отправьте себе в Telegram → Избранное. На телефоне: 📥 Получить → вставьте текст.");
    }catch{
      pasteRef.current?.select();
      setSyncOp("copied"); setSyncMsg("Выделите текст выше и скопируйте вручную (Ctrl+A, Ctrl+C)");
    }
  }

  function loadFromText(){
    const raw = syncText.trim();
    if(!raw){ setSyncOp("error"); setSyncMsg("Вставьте текст с другого устройства"); return; }
    try{
      const encoded = raw.startsWith("TTK1:") ? raw.slice(5) : raw;
      let json;
      try{ json = decodeURIComponent(escape(atob(encoded))); }catch{ json = atob(encoded); }
      const data = JSON.parse(json);
      const products = data.p || data.products;
      const semis    = data.s || data.semis   || [];
      const dishes   = data.d || data.dishes  || [];
      if(!Array.isArray(products)){ setSyncOp("error"); setSyncMsg("Неверный формат — это не данные ТТК"); return; }
      isFirstState.current = true;
      dispatch({type:"LOAD_ALL", d:{products, semis, dishes}});
      LS.set("products",products); LS.set("semis",semis); LS.set("dishes",dishes);
      setSyncOp("loaded");
      setSyncMsg(`✓ Загружено! Продуктов: ${products.length}, полуфабр.: ${semis.length}, блюд: ${dishes.length}`);
    }catch(e){ setSyncOp("error"); setSyncMsg("Ошибка: убедитесь что скопировали текст полностью"); }
  }

  // ── Резервная копия JSON ──
  const importRef = useRef(null);
  const [showBackup, setShowBackup] = useState(false);
  const [backupData, setBackupData] = useState(null);
  const [backupErr,  setBackupErr]  = useState("");

  function exportJSON(){
    const data={version:1,exported:new Date().toISOString(),products:state.products,semis:state.semis,dishes:state.dishes};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`ttk-${new Date().toLocaleDateString("ru").replace(/\./g,"-")}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }
  function handleImportFile(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!Array.isArray(d.products)){ setBackupErr("Неверный формат."); setBackupData(null); }
        else{ setBackupData(d); setBackupErr(""); }
      }catch{ setBackupErr("Ошибка чтения."); setBackupData(null); }
      setShowBackup(true);
    };
    reader.readAsText(file); e.target.value="";
  }
  function confirmBackup(){
    if(!backupData) return;
    isFirstState.current=true;
    dispatch({type:"LOAD_ALL",d:backupData});
    LS.set("products",backupData.products); LS.set("semis",backupData.semis||[]); LS.set("dishes",backupData.dishes||[]);
    setShowBackup(false); setBackupData(null);
  }

  const TABS=[
    {id:"products",label:"Продукты и цены",     icon:"🥦"},
    {id:"semis",   label:"Соуса и полуфабрикаты",icon:"🥣"},
    {id:"dishes",  label:"Готовые блюда",         icon:"🍱"},
  ];

  if(!authed) return <LoginScreen onLogin={()=>setAuthed(true)}/>;

  if(!appReady) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",
    justifyContent:"center",flexDirection:"column",gap:20,background:C.bg}}>
    <div style={{
      width:64,height:64,borderRadius:18,
      background:`linear-gradient(135deg,${C.green},${C.teal})`,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:32,boxShadow:`0 0 40px ${C.green}44`,
      animation:"spin 2s linear infinite"
    }}>🍱</div>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.text,fontWeight:600}}>
      ТТК Суши-бар
    </div>
    <div style={{color:C.muted,fontSize:13,letterSpacing:"1px",textTransform:"uppercase"}}>
      Загружаем данные…
    </div>
  </div>;

  return <div style={{minHeight:"100vh"}}>
    {/* ══ ШАПКА ══ */}
    <div style={{background:`linear-gradient(135deg,#111310,#0D0F0B)`,
      borderBottom:`1px solid ${C.border}`,
      padding:"0 16px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",
      position:"sticky",top:0,zIndex:50,
      boxShadow:"0 1px 0 #1E2019, 0 4px 24px rgba(0,0,0,.5)",gap:8,overflow:"hidden"}}>

      {/* Плавающие ингредиенты фоном */}
      <span className="header-ingredient hi-1">🐟</span>
      <span className="header-ingredient hi-2">🥑</span>
      <span className="header-ingredient hi-3">🍚</span>
      <span className="header-ingredient hi-4">🧅</span>
      <span className="header-ingredient hi-5">🫙</span>
      <span className="header-ingredient hi-6">🥩</span>
      <span className="header-ingredient hi-7">🧀</span>
      <span className="header-ingredient hi-8">🌿</span>

      <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:1,minWidth:0,position:"relative"}}>
        <div style={{width:34,height:34,borderRadius:10,
          background:`linear-gradient(135deg,${C.green},${C.teal})`,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:18,boxShadow:`0 0 16px ${C.green}44`,flexShrink:0}}>🍱</div>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,
            color:C.text,letterSpacing:".3px",lineHeight:1.1}}>ТТК Суши-бар</div>
          <div style={{fontSize:10,color:C.muted,letterSpacing:"1.5px",textTransform:"uppercase",marginTop:1}}>
            Технологические карты
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
        <button onClick={manualSync} title="Синхронизировать" style={{
          background:"transparent",border:`1px solid ${C.border}`,
          borderRadius:10,padding:"7px 10px",fontSize:14,color:C.muted}}>🔄</button>
        <button onClick={()=>{
          try{localStorage.removeItem("ttk_auth");}catch{}
          setAuthed(false);
        }} style={{
          background:"transparent",border:`1px solid ${C.border}`,
          borderRadius:10,padding:"7px 14px",fontSize:12,
          color:C.muted,fontWeight:600}}>Выйти</button>

        {/* Статус Supabase */}
        <div style={{display:"flex",alignItems:"center",gap:6,
          background:sync==="offline"?`${C.yellow}15`:sync==="saved"||sync==="synced"?`${C.green}15`:"transparent",
          border:`1px solid ${sync==="offline"?C.yellow+"66":sync==="saved"||sync==="synced"?C.green+"44":sync==="saving"?C.yellow+"44":sync==="error"?C.accent+"44":C.border}`,
          borderRadius:20,padding:"6px 12px",transition:"all .3s",cursor:sync==="error"?"pointer":"default"}}
          onClick={sync==="error"?()=>setShowSetup(true):undefined}
          title={sync==="offline"?"Нет интернета — изменения сохранятся локально и синхронизируются автоматически":(sbError||"Supabase")}>
          <span style={{
            width:7,height:7,borderRadius:"50%",flexShrink:0,
            background:sync==="offline"?C.yellow:sync==="saved"||sync==="synced"?C.green:sync==="saving"?C.yellow:sync==="error"?C.accent:C.muted,
            boxShadow:sync==="offline"?`0 0 6px ${C.yellow}`:sync==="saved"||sync==="synced"?`0 0 6px ${C.green}`:"none",
            ...(sync==="saving"?{animation:"spin .9s linear infinite",display:"inline-block"}:{})
          }}/>
          <span style={{fontSize:11,fontWeight:600,whiteSpace:"nowrap",
            color:sync==="offline"?C.yellow:sync==="saved"||sync==="synced"?C.green:sync==="saving"?C.yellow:sync==="error"?C.accent:C.muted}}>
            {sync==="offline"?"📴 Офлайн":sync==="saved"?"Сохранено":sync==="synced"?"Обновлено":sync==="saving"?"Синхронизация…":sync==="error"?"Ошибка ↗":"Авто"}
          </span>
        </div>
        {/* Баннер несохранённых изменений */}
        {!isOnline&&pendingSync.current&&<span style={{fontSize:10,color:C.yellow,fontWeight:600}}>
          есть несохранённые
        </span>}
        <input ref={importRef} type="file" accept=".json" onChange={handleImportFile} style={{display:"none"}}/>
      </div>
    </div>

    {/* ══ МОДАЛ: Настройка таблицы Supabase ══ */}
    {showSetup&&<Modal title="⚙️ Настройка Supabase" onClose={()=>setShowSetup(false)} width={500}>
      <div style={{background:C.yellowSoft,border:`1px solid ${C.yellow}44`,borderRadius:10,
        padding:"12px 14px",fontSize:13,color:C.yellow,marginBottom:16,lineHeight:1.7}}>
        <b>Нужно создать таблицу в Supabase!</b><br/>
        Откройте Supabase → ваш проект → <b>SQL Editor</b> → вставьте SQL ниже → нажмите <b>Run</b>
      </div>
      <div style={{background:"#0a0a14",borderRadius:10,padding:14,marginBottom:14,
        border:`1px solid ${C.border}`,fontFamily:"monospace",fontSize:12,color:C.teal,lineHeight:1.8,
        userSelect:"all",cursor:"text"}}>
        {`CREATE TABLE IF NOT EXISTS ttk_data (\n  id TEXT PRIMARY KEY,\n  payload JSONB NOT NULL,\n  updated_at TIMESTAMPTZ DEFAULT NOW()\n);\n\nALTER TABLE ttk_data ENABLE ROW LEVEL SECURITY;\n\nCREATE POLICY "allow_all" ON ttk_data\n  FOR ALL USING (true) WITH CHECK (true);`}
      </div>
      <div style={{background:C.tealSoft,border:`1px solid ${C.teal}44`,borderRadius:8,
        padding:"8px 12px",fontSize:12,color:C.teal,marginBottom:14}}>
        💡 После выполнения SQL нажмите 🔄 в шапке для синхронизации
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={async()=>{
          setShowSetup(false);
          await manualSync();
        }} variant="teal" style={{flex:1}}>✓ Таблица создана, синхронизировать</Btn>
        <Btn variant="outline" onClick={()=>setShowSetup(false)}>Закрыть</Btn>
      </div>
    </Modal>}

    {/* ══ МОДАЛ: Перенос данных через Заметки ══ */}
    {showSyncModal&&<Modal title={syncTab==="export"?"📤 Отправить на другое устройство":"📥 Получить с другого устройства"}
      onClose={()=>setShowSyncModal(false)} width={440}>

      {syncMsg&&<div style={{borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,
        background:syncOp==="loaded"||syncOp==="copied"?C.greenSoft:C.accentSoft,
        border:`1px solid ${syncOp==="loaded"||syncOp==="copied"?C.green:C.accent}44`,
        color:syncOp==="loaded"||syncOp==="copied"?C.green:C.accent}}>{syncMsg}</div>}

      {syncTab==="export"&&<>
        <div style={{background:C.tealSoft,border:`1px solid ${C.teal}33`,borderRadius:12,
          padding:"12px 14px",marginBottom:16,lineHeight:1.9}}>
          <div style={{fontWeight:700,color:C.teal,marginBottom:6,fontSize:13}}>📱 На телефоне (iOS):</div>
          <div style={{fontSize:12,color:C.teal}}>
            1. Нажмите <b>Поделиться</b> → выберите <b>Заметки</b><br/>
            2. Заметка появится на телефоне через iCloud автоматически<br/>
            3. На телефоне: скопируйте заметку → <b>📥 Получить</b>
          </div>
          <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.teal}33`,fontWeight:700,color:C.teal,fontSize:13}}>💻 На ноутбуке (Mac/Windows):</div>
          <div style={{fontSize:12,color:C.teal}}>
            1. Нажмите <b>Скопировать</b><br/>
            2. Вставьте в Заметки / Telegram Избранное<br/>
            3. На телефоне: скопируйте → <b>📥 Получить</b>
          </div>
        </div>

        <div style={{fontSize:12,color:C.muted,marginBottom:10,textAlign:"center"}}>
          {state.products.length} продуктов · {state.semis.length} полуфабрикатов · {state.dishes.length} блюд
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          <Btn onClick={shareData} variant="teal" style={{fontSize:14,padding:"12px 8px"}}>
            📤 Поделиться
          </Btn>
          <Btn onClick={copyToClipboard} variant="outline" style={{fontSize:14,padding:"12px 8px"}}>
            📋 Скопировать
          </Btn>
        </div>

        <textarea ref={pasteRef} value={syncText} readOnly rows={2} onClick={e=>e.target.select()}
          style={{width:"100%",fontFamily:"monospace",fontSize:9,resize:"none",
            background:C.surface,color:C.muted,border:`1px solid ${C.border}`,
            borderRadius:8,padding:"6px 8px",boxSizing:"border-box"}}/>
      </>}

      {syncTab==="import"&&<>
        <div style={{background:C.purpleSoft,border:`1px solid ${C.purple}33`,borderRadius:12,
          padding:"12px 14px",marginBottom:16,lineHeight:1.9}}>
          <div style={{fontWeight:700,color:C.purple,marginBottom:6,fontSize:13}}>📱 С телефона / ноутбука:</div>
          <div style={{fontSize:12,color:C.purple}}>
            1. На другом устройстве: <b>📤 Поделиться</b> → сохранить в Заметки<br/>
            2. Открыть Заметки → скопировать весь текст заметки<br/>
            3. Вставить сюда и нажать <b>Загрузить</b>
          </div>
        </div>

        {syncOp==="loaded"
          ?<div style={{textAlign:"center",padding:"24px 0"}}>
            <div style={{fontSize:40,marginBottom:10}}>✅</div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Данные загружены!</div>
            <div style={{color:C.muted,fontSize:13,marginBottom:16}}>{syncMsg}</div>
            <Btn onClick={()=>setShowSyncModal(false)}>Закрыть</Btn>
          </div>
          :<>
            <Field label="Вставьте текст из Заметок">
              <textarea value={syncText} onChange={e=>{setSyncText(e.target.value);setSyncOp("");setSyncMsg("");}}
                rows={5} placeholder="Вставьте скопированный текст (TTK1:...)"
                style={{fontFamily:"monospace",fontSize:11,resize:"vertical"}} autoFocus/>
            </Field>
            <Btn onClick={loadFromText} variant="purple" style={{width:"100%",fontSize:15,padding:12}}
              disabled={!syncText.trim()}>📥 Загрузить данные</Btn>
          </>}
      </>}
    </Modal>}

    {/* ══ МОДАЛ: JSON резервная копия ══ */}
    {showBackup&&<Modal title="📥 Загрузить JSON" onClose={()=>{setShowBackup(false);setBackupData(null);}} width={380}>
      {backupErr&&<div style={{background:C.accentSoft,borderRadius:8,padding:"10px 14px",color:C.accent,fontSize:13,marginBottom:14}}>⚠ {backupErr}</div>}
      {backupData&&<>
        <div style={{background:C.greenSoft,border:`1px solid ${C.green}44`,borderRadius:10,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,color:C.green,marginBottom:8}}>✓ Файл распознан</div>
          <div style={{display:"flex",gap:12}}>
            {[{l:"Продуктов",v:backupData.products?.length||0,c:C.teal},
              {l:"Полуфабр.",v:backupData.semis?.length||0,c:C.purple},
              {l:"Блюд",v:backupData.dishes?.length||0,c:C.accent}]
              .map(({l,v,c})=><div key={l} style={{flex:1,background:C.card,borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontWeight:800,fontSize:18,color:c}}>{v}</div>
                <div style={{fontSize:10,color:C.muted}}>{l}</div>
              </div>)}
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={confirmBackup} variant="success" style={{flex:1}}>✓ Загрузить</Btn>
          <Btn variant="outline" onClick={()=>{setShowBackup(false);setBackupData(null);}}>Отмена</Btn>
        </div>
      </>}
    </Modal>}

    {/* ══ ВКЛАДКИ ══ */}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,
      padding:"0 16px",display:"flex",gap:0,overflowX:"auto"}}>
      {TABS.map((t)=><button key={t.id} onClick={()=>setTab(t.id)}
        style={{background:"none",color:tab===t.id?C.green:C.muted,border:"none",
          borderBottom:`2px solid ${tab===t.id?C.green:"transparent"}`,
          padding:"16px 16px",fontSize:13,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap",
          display:"flex",alignItems:"center",gap:8,transition:"color .2s",cursor:"pointer"}}>
        <span style={{
          background:tab===t.id?C.green:C.tag,
          color:tab===t.id?C.bg:C.muted,
          borderRadius:6,width:20,height:20,display:"inline-flex",alignItems:"center",
          justifyContent:"center",fontSize:11,fontWeight:800,
          transition:"all .2s",flexShrink:0
        }}>{t.icon}</span>
        {t.label}
      </button>)}
    </div>

    <div style={{padding:16,maxWidth:1300,margin:"0 auto"}}>
      {tab==="products"&&<ProductsTab state={state} dispatch={dispatch}/>}
      {tab==="semis"&&   <SemisTab    state={state} dispatch={dispatch}/>}
      {tab==="dishes"&&  <DishesTab   state={state} dispatch={dispatch}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- ═══════ SERVICE WORKER — ОФЛАЙН РЕЖИМ ═══════ -->
<script>
(function(){
  if(!("serviceWorker" in navigator)) return;

  // Service Worker встроен через Blob — отдельный файл не нужен
  const swCode = `
    const CACHE = "ttk-cache-v1";
    // Ресурсы которые кэшируем для офлайн-работы
    const ASSETS = [
      "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js",
      "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
    ];

    // При установке — кэшируем библиотеки
    self.addEventListener("install", (e)=>{
      self.skipWaiting();
      e.waitUntil(
        caches.open(CACHE).then((cache)=>{
          return Promise.allSettled(ASSETS.map((url)=>cache.add(url).catch(()=>{})));
        })
      );
    });

    // Активация — удаляем старые кэши
    self.addEventListener("activate", (e)=>{
      e.waitUntil(
        caches.keys().then((keys)=>
          Promise.all(keys.filter((k)=>k!==CACHE).map((k)=>caches.delete(k)))
        ).then(()=>self.clients.claim())
      );
    });

    // Перехват запросов
    self.addEventListener("fetch", (e)=>{
      const url = e.request.url;

      // НИКОГДА не кэшируем запросы к Supabase — данные всегда свежие из сети
      if(url.includes("supabase.co")){
        return; // пропускаем, идёт обычный сетевой запрос
      }

      // Для страницы и библиотек: сначала сеть, при ошибке — кэш
      if(e.request.method === "GET"){
        e.respondWith(
          fetch(e.request)
            .then((resp)=>{
              // Успешный ответ — обновляем кэш
              if(resp && resp.status === 200){
                const clone = resp.clone();
                caches.open(CACHE).then((cache)=>cache.put(e.request, clone).catch(()=>{}));
              }
              return resp;
            })
            .catch(()=>{
              // Нет сети — берём из кэша
              return caches.match(e.request).then((cached)=>{
                if(cached) return cached;
                // Если запрашивают страницу а её нет в кэше — отдаём корень
                if(e.request.mode === "navigate"){
                  return caches.match("/") || caches.match("./");
                }
                return new Response("Офлайн", {status:503});
              });
            })
        );
      }
    });
  `;

  try{
    const blob = new Blob([swCode], {type:"application/javascript"});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, {scope:"./"})
      .then(()=>{
        // Дополнительно кэшируем саму страницу
        if(navigator.onLine){
          caches.open("ttk-cache-v1").then((cache)=>{
            cache.add(window.location.href).catch(()=>{});
            cache.add("./").catch(()=>{});
          });
        }
      })
      .catch(()=>{}); // тихо игнорируем если SW не поддерживается
  }catch(e){}
})();
</script>
</body>
